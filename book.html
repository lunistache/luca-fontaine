      <span></span><span></span>
    </button>
  </div>
</header>

<main id="top">

  <!-- ===== Coaching enquiry ===== -->
  <section class="section section--top enquiry-page" id="book">
    <div class="section__head reveal">
      <p class="eyebrow" data-i18n="book.eyebrow">Coaching</p>
      <h2 class="section__title" data-i18n="book.title">Book a session</h2>
      <p class="section__lede" data-i18n="book.lede">Tell me about your project and what you're preparing. Enquiries here come straight to me — not through management — and I'll get back to you directly.</p>
    </div>

    <!--
      SETUP: this form posts to Formspree. Replace YOUR_FORM_ID below with the
      ID from your Formspree form (https://formspree.io — create a form pointed
      at luca7.fontaine@gmail.com, then paste its endpoint here). Works on any
      static host (Netlify, GitHub Pages, etc.). Until then, submissions won't send.
    -->
    <form class="enquiry reveal" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="hidden" name="_subject" value="New coaching session enquiry" />
      <!-- honeypot: bots fill this, humans don't -->
      <p class="enquiry__hp" aria-hidden="true">
        <label>Leave this field empty <input type="text" name="_gotcha" tabindex="-1" autocomplete="off" /></label>
      </p>

      <div class="field-row">
        <p class="field">
          <label for="f-name" data-i18n="book.name">Name</label>
          <input id="f-name" type="text" name="name" required autocomplete="name" />
        </p>
        <p class="field">
          <label for="f-email" data-i18n="book.email">Email</label>
          <input id="f-email" type="email" name="email" required autocomplete="email" />
        </p>
      </div>

      <div class="field-row">
        <p class="field">
          <label for="f-project">
            <span data-i18n="book.project">Project / production</span>
            <span class="field__opt" data-i18n="book.optional">optional</span>
          </label>
          <input id="f-project" type="text" name="project" />
        </p>
        <p class="field">
          <label for="f-service" data-i18n="book.service">What do you need?</label>
          <select id="f-service" name="service">
            <option value="Dialect coaching" data-i18n="book.svc.dialect">Dialect coaching</option>
            <option value="Audition & role prep" data-i18n="book.svc.audition">Audition &amp; role prep</option>
            <option value="Self-tape prep" data-i18n="book.svc.selftape">Self-tape prep</option>
            <option value="Accent reduction & speech" data-i18n="book.svc.accent">Accent reduction &amp; speech</option>
            <option value="Public speaking" data-i18n="book.svc.speaking">Public speaking</option>
            <option value="Other" data-i18n="book.svc.other">Other</option>
          </select>
        </p>
      </div>

      <p class="field">
        <label for="f-timeline">
          <span data-i18n="book.timeline">Timeline / preferred dates</span>
          <span class="field__opt" data-i18n="book.optional">optional</span>
        </label>
        <input id="f-timeline" type="text" name="timeline" />
      </p>

      <p class="field">
        <label for="f-message" data-i18n="book.message">Tell me about the project</label>
        <textarea id="f-message" name="message" rows="6" required></textarea>
      </p>

      <button class="btn" type="submit" data-i18n="book.submit">Send request</button>
    </form>
  </section>

</main>

<footer class="footer">
  <p class="footer__name">Luca Fontaine</p>
  <p class="footer__meta"><span data-i18n="footer.meta">Actor • Writer • Coach</span></p>
</footer>

<script src="i18n.js"></script>

</body>
